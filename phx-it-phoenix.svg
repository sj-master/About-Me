<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient glow -->
    <radialGradient id="phoenixGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff66ff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ff0066" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#ff6600" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Wing gradient -->
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="50%" stop-color="#ff0066"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>

    <!-- Flame gradient -->
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="50%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff0033"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="130" cy="120" r="110" fill="url(#phoenixGlow)">
    <animate attributeName="r" values="100;115;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Phoenix body -->
  <path d="M130 60
           C115 80 110 105 115 125
           C120 145 135 155 145 150
           C155 145 160 130 158 115
           C156 100 145 80 130 60 Z"
        fill="url(#flameGradient)">
    <animate attributeName="d"
             dur="3s"
             repeatCount="indefinite"
             values="
             M130 60 C115 80 110 105 115 125 C120 145 135 155 145 150 C155 145 160 130 158 115 C156 100 145 80 130 60 Z;
             M130 58 C113 78 108 104 114 126 C121 147 137 158 147 151 C158 144 162 129 159 113 C155 98 144 78 130 58 Z;
             M130 60 C115 80 110 105 115 125 C120 145 135 155 145 150 C155 145 160 130 158 115 C156 100 145 80 130 60 Z"/>
  </path>

  <!-- Left wing -->
  <path d="M130 80
           C100 70 80 80 65 105
           C55 120 50 140 60 155
           C70 170 90 175 105 165
           C95 150 95 135 105 120
           C115 105 125 90 130 80 Z"
        fill="url(#wingGradient)">
    <animate attributeName="d"
             dur="3s"
             repeatCount="indefinite"
             values="
             M130 80 C100 70 80 80 65 105 C55 120 50 140 60 155 C70 170 90 175 105 165 C95 150 95 135 105 120 C115 105 125 90 130 80 Z;
             M130 80 C98 68 78 78 63 104 C52 120 48 142 59 158 C71 172 92 178 107 167 C96 151 96 134 107 118 C117 104 126 90 130 80 Z;
             M130 80 C100 70 80 80 65 105 C55 120 50 140 60 155 C70 170 90 175 105 165 C95 150 95 135 105 120 C115 105 125 90 130 80 Z"/>
  </path>

  <!-- Right wing -->
  <path d="M130 80
           C160 70 180 80 195 105
           C205 120 210 140 200 155
           C190 170 170 175 155 165
           C165 150 165 135 155 120
           C145 105 135 90 130 80 Z"
        fill="url(#wingGradient)">
    <animate attributeName="d"
             dur="3s"
             repeatCount="indefinite"
             values="
             M130 80 C160 70 180 80 195 105 C205 120 210 140 200 155 C190 170 170 175 155 165 C165 150 165 135 155 120 C145 105 135 90 130 80 Z;
             M130 80 C162 68 182 78 197 104 C208 120 212 142 201 158 C189 172 168 178 153 167 C164 151 164 134 153 118 C143 104 134 90 130 80 Z;
             M130 80 C160 70 180 80 195 105 C205 120 210 140 200 155 C190 170 170 175 155 165 C165 150 165 135 155 120 C145 105 135 90 130 80 Z"/>
  </path>

  <!-- Head / beak -->
  <circle cx="130" cy="55" r="8" fill="#ff00ff">
    <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="133" cy="53" r="2" fill="#ffffff"/>

  <!-- Tail flames -->
  <path d="M130 140
           C120 160 118 180 125 200
           C130 215 135 225 130 235"
        stroke="#ff6600" stroke-width="4" fill="none" stroke-linecap="round">
    <animate attributeName="stroke-width" values="3;6;3" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#ff6600;#ffcc00;#ff6600" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- PHX‑IT text -->
  <text x="130" y="230" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="16">
    PHX‑IT
    <animate attributeName="fill" values="#ff00ff;#ff6600;#ff00ff" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>
